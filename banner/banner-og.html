<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1200px; height:630px; overflow:hidden; }
  :root{ --brass:#C9A227; --brass-lt:#E8C860; --wa:#25D366; }
  .stage{
    position:relative; width:1200px; height:630px;
    background:
      radial-gradient(760px 540px at 900px 60px, rgba(76,47,168,.55), transparent 64%),
      radial-gradient(620px 480px at 200px 200px, rgba(109,40,217,.22), transparent 64%),
      radial-gradient(760px 640px at 1120px 660px, rgba(201,162,39,.14), transparent 62%),
      linear-gradient(125deg, #0A0715 0%, #140E29 44%, #1B1340 74%, #0B0718 100%);
    font-family:"IBM Plex Sans",sans-serif; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; text-align:center;
    padding:56px 60px;
  }
  .stage::after{
    content:""; position:absolute; left:0; right:0; top:0; height:3px;
    background:linear-gradient(90deg, transparent, rgba(201,162,39,.6) 50%, transparent);
  }

  /* Brand lockup */
  .brand{ display:flex; align-items:center; gap:20px; }
  .ps-mark{
    width:92px; height:92px; border-radius:24px; flex:none;
    background:linear-gradient(135deg,#2E2159,#6D28D9);
    box-shadow:inset 0 0 0 2.6px rgba(201,162,39,.85), 0 16px 36px rgba(109,40,217,.45);
    display:flex; align-items:center; justify-content:center;
    font-family:"Sora",sans-serif; font-weight:800; font-size:42px; color:#fff; letter-spacing:.5px;
  }
  .brand .txt{ text-align:left; }
  .brand .name{ font-family:"Sora",sans-serif; font-weight:800; font-size:52px; line-height:1; color:#fff; letter-spacing:-.01em; }
  .brand .since{ font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:19px; letter-spacing:.1em; text-transform:uppercase; color:var(--brass-lt); margin-top:10px; }

  /* Services headline */
  .services{
    font-family:"Sora",sans-serif; font-weight:800; font-size:60px; line-height:1.06; letter-spacing:-.02em;
    background:linear-gradient(180deg,#FFFFFF 0%, #EDE9FE 45%, #C3B2F7 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subservices{ font-family:"Sora",sans-serif; font-weight:700; font-size:33px; color:#F2EEFC; letter-spacing:-.005em; }
  .subservices .b{ color:var(--brass); }

  /* Locations */
  .locations{ font-family:"IBM Plex Sans",sans-serif; font-weight:600; font-size:32px; color:#D8D2EE; }
  .locations .d{ color:var(--brass); padding:0 5px; }

  /* Contact */
  .contact{ display:flex; align-items:center; justify-content:center; gap:30px; }
  .wa{
    display:inline-flex; align-items:center; gap:18px;
    padding:18px 34px 18px 22px; border-radius:18px;
    background:linear-gradient(135deg,#1FBE5A,#25D366);
    box-shadow:0 14px 32px rgba(37,211,102,.32), inset 0 0 0 1.6px rgba(255,255,255,.25);
  }
  .wa .glyph{ width:56px; height:56px; border-radius:50%; background:#fff; flex:none; display:flex; align-items:center; justify-content:center; }
  .wa .glyph svg{ width:37px; height:37px; }
  .wa .num{ font-family:"Sora",sans-serif; font-weight:800; font-size:46px; color:#06301A; letter-spacing:.01em; white-space:nowrap; }
  .site{ font-family:"Sora",sans-serif; font-weight:800; font-size:38px; color:var(--brass-lt); }
  .site .i{ opacity:.6; }
</style>
</head>
<body>
  <div class="stage">
    <div class="brand">
      <div class="ps-mark">PS</div>
      <div class="txt">
        <div class="name">Proxy Support India</div>
        <div class="since">Since 2011 · End-to-End IT Career Proxy Support</div>
      </div>
    </div>

    <div class="services">Proxy Interview &amp; Job Support</div>
    <div class="subservices">Profile Marketing <span class="b">·</span> Profile Engineering <span class="b">·</span> Recruiter Calls</div>

    <div class="locations">USA <span class="d">·</span> Canada <span class="d">·</span> UK <span class="d">·</span> Europe <span class="d">·</span> Australia <span class="d">·</span> India</div>

    <div class="contact">
      <div class="wa">
        <span class="glyph">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#25D366" d="M16 3C9.4 3 4 8.4 4 15c0 2.1.6 4.2 1.6 6L4 29l8.2-1.6c1.7.9 3.7 1.4 5.8 1.4 6.6 0 12-5.4 12-12S22.6 3 16 3z"/>
            <path fill="#fff" d="M12.5 9.6c-.3-.6-.5-.6-.8-.6h-.7c-.2 0-.6.1-.9.4-.3.3-1.2 1.2-1.2 2.9 0 1.7 1.2 3.3 1.4 3.6.2.2 2.4 3.8 5.9 5.2 2.9 1.1 3.5.9 4.1.9.6-.1 2-.8 2.3-1.6.3-.8.3-1.5.2-1.6-.1-.2-.3-.2-.7-.4-.3-.2-2-1-2.3-1.1-.3-.1-.5-.2-.8.2-.2.3-.9 1.1-1.1 1.3-.2.2-.4.3-.7.1-.4-.2-1.5-.6-2.9-1.8-1.1-1-1.8-2.2-2-2.5-.2-.3 0-.5.1-.7.1-.1.3-.4.5-.6.2-.2.2-.3.3-.5.1-.2.1-.4 0-.6-.1-.2-.8-1.9-1-2.6z"/>
          </svg>
        </span>
        <span class="num">+91 96539 59626</span>
      </div>
      <div class="site">proxysupportindia.com</div>
    </div>
  </div>
</body>
</html>
